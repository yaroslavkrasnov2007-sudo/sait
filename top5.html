<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакты | NeuroWeb</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="menu">
        <a href="index.html" class="button">Главная</a>
        <a href="services.html" class="button">Услуги</a>
        <a href="gallery.html" class="button">ИИ-Галерея</a>
        <a href="contacts.html" class="button">Контакты</a>
    </div>

    <div class="page-container">
        <h1>Свяжитесь с нами</h1>
        <p class="lead-text">Оставьте заявку, и мы свяжемся с вами в течение пары минут для обсуждения проекта.</p>

        <div class="content-box">
            <form>
                <div>
                    <label for="name">Ваше имя:</label>
                    <input type="text" id="name" placeholder="Например: Алексей" required>
                </div>

                <div>
                    <label for="email">Ваш Email:</label>
                    <input type="email" id="email" placeholder="example@mail.ru" required>
                </div>

                <div>
                    <label for="message">Ваш вопрос, идея или техническое задание:</label>
                    <textarea id="message" rows="6" placeholder="Напишите всё, что вас интересует..." required></textarea>
                </div>

                <div style="text-align: center; margin-top: 10px;">
                    <button type="button" class="button" onclick="alert('Форма успешно обработана локально! Ваши данные в безопасности.')">Отправить сообщение</button>
                </div>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 NeuroWeb. Все права защищены.</p>
    </footer>

</body>
</html>
